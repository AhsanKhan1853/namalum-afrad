<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaisaKid – Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e2e0d8;
      --text: #1a1916;
      --text-muted: #7a7870;
      --primary: #1a6b4a;
      --primary-light: #e8f5ee;
      --gradient-start: #1a6b4a;
      --gradient-end: #2d9e6f;
      --shadow-card: 0 4px 24px rgba(0,0,0,0.07);
      --radius: 14px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon-wrap {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 8px 24px rgba(26,107,74,0.3);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .icon-wrap svg { width: 36px; height: 36px; color: white; }
    .code {
      font-size: 80px;
      font-weight: 700;
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.6; }
    .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      height: 42px; padding: 0 20px; border-radius: 99px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      text-decoration: none; cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      color: white;
      box-shadow: 0 4px 12px rgba(26,107,74,0.25);
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-outline {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .btn-outline:hover { background: var(--primary-light); color: var(--primary); }
    .btn svg { width: 15px; height: 15px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .container > * { animation: fadeUp 0.5s ease both; }
    .icon-wrap { animation-name: float, fadeUp; animation-duration: 3s, 0.5s; animation-timing-function: ease-in-out, ease; animation-iteration-count: infinite, 1; animation-fill-mode: none, both; }
    .code { animation-delay: 0.1s; }
    h1 { animation-delay: 0.15s; }
    p { animation-delay: 0.2s; }
    .actions { animation-delay: 0.25s; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Return to one of the dashboards below.</p>
    <div class="actions">
      <a href="parent_dashboard.html" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
        Parent Dashboard
      </a>
      <a href="merchant_dashboard.html" class="btn btn-outline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Merchant Dashboard
      </a>
    </div>
  </div>
</body>
</html>
