<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaisaKid – Merchant Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: #e2e0d8;
      --text: #1a1916;
      --text-muted: #7a7870;
      --primary: #1a6b4a;
      --primary-light: #e8f5ee;
      --primary-fg: #ffffff;
      --gradient-start: #1a6b4a;
      --gradient-end: #2d9e6f;
      --warning: #b45309;
      --warning-bg: #fef3c7;
      --danger: #b91c1c;
      --danger-bg: #fee2e2;
      --success: #15803d;
      --success-bg: #dcfce7;
      --flagged: #92400e;
      --flagged-bg: #fef3c7;
      --shadow-card: 0 4px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-soft: 0 2px 12px rgba(0,0,0,0.05);
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    header {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 40;
    }
    .header-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: white; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(26,107,74,0.3);
    }
    .brand-icon svg { width: 20px; height: 20px; }
    .brand-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .brand-sub { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; margin-top: 1px; }
    .brand-sub svg { width: 11px; height: 11px; }
    nav { display: flex; gap: 4px; background: var(--surface2); border-radius: 999px; padding: 4px; }
    nav a {
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    nav a.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    nav a:hover:not(.active) { color: var(--text); }

    main { max-width: 1000px; margin: 0 auto; padding: 28px 20px; }

    .infobox {
      display: flex; align-items: flex-start; gap: 8px;
      background: var(--primary-light);
      border: 1px solid rgba(26,107,74,0.2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--primary);
      font-size: 13px;
      margin-bottom: 24px;
    }
    .infobox svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }
    .infobox .info-text p + p { margin-top: 2px; opacity: 0.8; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } nav a { padding: 6px 12px; } }
    .col { display: flex; flex-direction: column; gap: 20px; }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      animation: fadeUp 0.35s ease both;
    }
    .card:nth-child(2) { animation-delay: 0.07s; }
    .card:nth-child(3) { animation-delay: 0.14s; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    .card-header { padding: 18px 20px 0; }
    .card-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .card-title svg { width: 15px; height: 15px; color: var(--text-muted); }
    .card-body { padding: 16px 20px 20px; }

    /* Summary card */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .summary-stat {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
    }
    .summary-stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .summary-stat-val { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .summary-stat-val.green { color: var(--success); }
    .summary-stat-val.small { font-size: 16px; letter-spacing: -0.3px; }
    .today-total {
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      color: white;
      border-radius: var(--radius-sm);
      padding: 16px;
    }
    .today-label { font-size: 12px; opacity: 0.85; font-weight: 500; margin-bottom: 4px; }
    .today-val { font-size: 32px; font-weight: 700; letter-spacing: -1px; line-height: 1; }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-group:last-child { margin-bottom: 0; }
    label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px; }
    .input-row { display: flex; gap: 8px; }
    input[type="number"], input[type="text"] {
      flex: 1; height: 40px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0 12px;
      font-family: inherit; font-size: 14px; background: var(--surface);
      color: var(--text); outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,107,74,0.1); }
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      height: 40px; padding: 0 16px; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-icon {
      width: 40px; height: 40px; padding: 0; flex-shrink: 0;
      border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
      border-radius: var(--radius-sm);
    }
    .btn-icon:hover { background: var(--surface2); }
    .btn-icon svg { width: 16px; height: 16px; }
    .btn svg { width: 14px; height: 14px; }
    .btn-full { width: 100%; }

    /* Feedback */
    .feedback {
      display: flex; align-items: flex-start; gap: 8px;
      border-radius: var(--radius-sm); border: 1px solid; padding: 10px 12px;
      font-size: 13px; font-weight: 600; margin-top: 14px;
    }
    .feedback svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }
    .feedback.success { background: var(--success-bg); color: var(--success); border-color: rgba(21,128,61,0.3); }
    .feedback.error { background: var(--danger-bg); color: var(--danger); border-color: rgba(185,28,28,0.3); }
    .feedback.hidden { display: none; }

    /* Sales list */
    .sale-list { display: flex; flex-direction: column; gap: 8px; }
    .sale-empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 24px 0; }
    .sale-item {
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 12px; transition: background 0.12s;
    }
    .sale-item:hover { background: var(--surface2); }
    .sale-info { min-width: 0; flex: 1; }
    .sale-top { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .sale-id { font-family: 'DM Mono', monospace; font-size: 12px; }
    .sale-detail { font-size: 11px; color: var(--text-muted); }
    .sale-amount { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; flex-shrink: 0; }

    .badge {
      display: inline-flex; align-items: center;
      border-radius: 99px; border: 1px solid; padding: 1px 8px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .badge-success { background: var(--success-bg); color: var(--success); border-color: rgba(21,128,61,0.3); }
    .badge-failed { background: var(--danger-bg); color: var(--danger); border-color: rgba(185,28,28,0.3); }
    .badge-flagged { background: var(--flagged-bg); color: var(--flagged); border-color: rgba(146,64,14,0.4); }

    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: white; padding: 10px 18px;
      border-radius: 99px; font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="m9 12 2 2 4-4"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">PaisaKid</div>
        <div class="brand-sub" id="header-sub-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span id="header-sub">School Canteen – Ahmed</span>
        </div>
      </div>
    </div>
    <nav>
      <a href="parent_dashboard.html">Parent</a>
      <a href="merchant_dashboard.html" class="active">Merchant</a>
    </nav>
  </div>
</header>

<main>
  <div class="infobox">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
    <div class="info-text">
      <p><strong>Only approved school merchants can access this system.</strong></p>
      <p>All transactions are logged and monitored.</p>
    </div>
  </div>

  <div class="grid">
    <!-- LEFT -->
    <div class="col">

      <!-- Sales Summary -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            Sales Summary
          </div>
        </div>
        <div class="card-body">
          <div class="summary-grid">
            <div class="summary-stat">
              <div class="summary-stat-label">Total sales</div>
              <div class="summary-stat-val" id="stat-count">0</div>
            </div>
            <div class="summary-stat">
              <div class="summary-stat-label">Successful</div>
              <div class="summary-stat-val green" id="stat-success">0</div>
            </div>
          </div>
          <div class="today-total">
            <div class="today-label">Today's Revenue</div>
            <div class="today-val" id="stat-revenue">PKR 0</div>
          </div>
        </div>
      </div>

      <!-- Payment Form -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            Process Payment
          </div>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label for="student-id">Student ID</label>
            <div class="input-row">
              <input type="text" id="student-id" placeholder="Enter student ID (e.g. S123)" maxlength="10" oninput="this.value=this.value.toUpperCase()" />
              <button class="btn btn-icon" title="Scan QR" onclick="alert('QR scanner placeholder')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><line x1="21" y1="21" x2="21" y2="21"/><path d="M3 11h7v4"/><path d="M14 11h1v4h5"/></svg>
              </button>
            </div>
          </div>
          <div class="input-grid form-group">
            <div>
              <label for="item-name">Item</label>
              <input type="text" id="item-name" placeholder="Sandwich" maxlength="50" />
            </div>
            <div>
              <label for="amount">Amount (PKR)</label>
              <input type="number" id="amount" placeholder="150" min="1" max="10000" />
            </div>
          </div>
          <button class="btn btn-primary btn-full" onclick="handlePayment()">Process Payment</button>
          <div class="feedback hidden" id="feedback">
            <svg id="feedback-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"></svg>
            <span id="feedback-msg"></span>
          </div>
        </div>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="col">
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M14 8H8"/><path d="M16 12H8"/><path d="M13 16H8"/></svg>
            Recent Sales
          </div>
        </div>
        <div class="card-body">
          <div class="sale-list" id="sale-list">
            <div class="sale-empty">No sales yet. Process a payment to get started.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script src="state.js"></script>
<script>
  const pk = window.PaisaKid;
  const MERCHANT = 'School Canteen';

  function getBadge(status) {
    const cls = { Success: 'badge-success', Failed: 'badge-failed', Flagged: 'badge-flagged' }[status] || '';
    return `<span class="badge ${cls}">${status}</span>`;
  }

  function renderSummary(state) {
    const sales = state.transactions.filter(t => t.merchant === MERCHANT);
    const successful = sales.filter(t => t.status === 'Success');
    const revenue = successful.reduce((a, t) => a + t.amount, 0);
    document.getElementById('stat-count').textContent = sales.length;
    document.getElementById('stat-success').textContent = successful.length;
    document.getElementById('stat-revenue').textContent = pk.formatPKR(revenue);
  }

  function renderSales(state) {
    const sales = state.transactions.filter(t => t.merchant === MERCHANT);
    const list = document.getElementById('sale-list');
    if (!sales.length) {
      list.innerHTML = '<div class="sale-empty">No sales yet. Process a payment to get started.</div>';
      return;
    }
    list.innerHTML = sales.map(s => `
      <div class="sale-item">
        <div class="sale-info">
          <div class="sale-top">
            <span class="sale-id">${pk.maskStudentId(s.studentId)}</span>
            ${getBadge(s.status)}
          </div>
          <div class="sale-detail">${s.item} · ${pk.relativeTime(s.timestamp)}</div>
        </div>
        <span class="sale-amount">${pk.formatPKR(s.amount)}</span>
      </div>
    `).join('');
  }

  function render(state) {
    renderSummary(state);
    renderSales(state);
  }

  function setFeedback(ok, msg) {
    const el = document.getElementById('feedback');
    const icon = document.getElementById('feedback-icon');
    const msgEl = document.getElementById('feedback-msg');
    el.className = `feedback ${ok ? 'success' : 'error'}`;
    msgEl.textContent = msg;
    icon.innerHTML = ok
      ? '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'
      : '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>';
  }

  function handlePayment() {
    const studentId = document.getElementById('student-id').value;
    const item = document.getElementById('item-name').value;
    const amount = Number(document.getElementById('amount').value);

    const result = pk.processPayment({ studentId, item, amount, merchant: MERCHANT });
    setFeedback(result.ok, result.message);
    if (result.ok) {
      document.getElementById('item-name').value = '';
      document.getElementById('amount').value = '';
    }
  }

  pk.subscribe(render);
  render(pk.getState());
</script>
</body>
</html>
